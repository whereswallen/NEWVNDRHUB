name: Validate
permissions:
  contents: read
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Reject committed private keys and production secrets
        run: |
          if git grep -nE -- 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|sk_live_[A-Za-z0-9]+|sq0atp-[A-Za-z0-9_-]+' -- ':!package-lock.json'; then
            echo "Potential production secret detected" >&2
            exit 1
          fi
      - run: npm run build
        env:
          DATABASE_URL: postgres://unused:unused@localhost:5432/unused
          BETTER_AUTH_SECRET: ci-only-secret-at-least-32-characters
          BETTER_AUTH_URL: http://localhost:3000
