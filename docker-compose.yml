services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vndrhub
      POSTGRES_USER: vndrhub
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vndrhub -d vndrhub"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
