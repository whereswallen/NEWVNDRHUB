services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.vndrhub.ca}
    # Cloudflare Tunnel connects to these loopback-only origin ports.
    ports: ["127.0.0.1:80:80", "127.0.0.1:443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    networks: [edge]
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: vndrhub
      DATABASE_USER: vndrhub
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    pids_limit: 256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [edge, data]
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vndrhub
      POSTGRES_USER: vndrhub
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vndrhub -d vndrhub"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    networks: [data]
secrets:
  postgres_password:
    file: ./secrets/postgres_password
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
networks:
  edge:
  data:
    internal: true
